name: specguard

on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./packages/specguard
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
